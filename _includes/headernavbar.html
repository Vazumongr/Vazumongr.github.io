<nav class="navbar navbar-expand-lg my-navbar-dark">
      <div class="navbar-nav" style="margin:auto">
        {% for proj in site.data.navigation %}
        <a href="{{ proj.link }}"
            {% if page.url == proj.link %}
                class="currentPage navbar-text"
            {% else %}
                class="notCurrentPage navbar-text"
            {% endif %}>
            {{ proj.name }}
        </a>
        {% endfor %}
      </div>
  </nav>
